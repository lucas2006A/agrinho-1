<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Entrar | Interface Elegante</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <div class="glow"></div>
  <button class="btn-entrar" id="btnEntrar">Entrar</button>

  <script>
    const button = document.getElementById('btnEntrar');
    if (button) {
      button.addEventListener('click', (e) => {
        // Abre o link em uma nova aba
        window.open('https://github.dev/lucas2006A/Agrinho', '_blank');
      });
    }
  </script>
</body>
</html>
