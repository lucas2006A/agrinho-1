<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Concurso Agrinho 2026 | Ari Ribas</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <div class="overlay"></div>
  <div class="glow"></div>
  <div class="container">
    <h1 class="titulo">
      <span class="emoji">🌱</span> Concurso Agrinho 2026
    </h1>
    <p class="slogan">Agro forte, futuro sustentável</p>
    <p class="subtitulo">Equilíbrio entre produção e meio ambiente</p>
    <p class="descricao">
      Transformando a agricultura através da inovação e sustentabilidade
    </p>
    <button class="btn-explorar" id="btnExplorar">Explorar Ferramentas</button>
  </div>

  <script>
    const button = document.getElementById('btnExplorar');
    if (button) {
      button.addEventListener('click', () => {
        window.open('https://agrinho-ten-vert.vercel.app/#ferramentas', '_blank');
      });
    }
  </script>
</body>
</html>
